name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  NODE_VERSION: "20"

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
        env:
          # Integration tests (tests/integration/) skip automatically when absent.
          # Add this secret to run them: GitHub → Settings → Secrets → Actions → OPENROUTER_API_KEY
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Migration-before-code sequencing reminder
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          git fetch origin ${{ github.base_ref }} --depth=50
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^supabase/migrations/'; then
            echo "::warning::This PR adds/changes a Supabase migration. Deployment safety requires the migration to be applied to the target database BEFORE this PR's code reaches production — this pipeline does not apply migrations automatically. See docs/runbooks/account-deletion-deployment.md."
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npx next build
        env:
          # Syntactically valid, non-secret build-only values. Runtime deployments
          # must provide the complete validated production environment.
          NEXT_PUBLIC_SUPABASE_URL: "https://ci-build.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-anon-key-for-static-build"
          NEXT_PUBLIC_APP_URL: "https://ci-build.acme.invalid"

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # No --prod flag = preview deployment (staging)

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
