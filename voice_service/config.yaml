voice_service:
  model_id: "IndexTeam/IndexTTS-2"
  # Path to the clean reference clip used for zero-shot cloning.
  # Relative to voice_service/ directory. Created by prepare_data.py.
  reference_audio: "voices/emma_ref.wav"
  # Emma persona style (0-2 scale; 1.0 = warm/natural, >1 = more expressive)
  exaggeration: 1.0
  # After fine-tuning, set this to the checkpoint path e.g. checkpoints/emma/best.pt
  # Leave empty to use base model weights (zero-shot mode).
  finetuned_checkpoint: ""

data:
  # Source recordings - relative to voice_service/
  raw_dir: "voices/raw"
  # Output of prepare_data.py - 5-15s mono 16kHz WAV clips
  clips_dir: "voices/clips"
  sample_rate: 16000
  min_clip_seconds: 5
  max_clip_seconds: 15

training:
  output_dir: "checkpoints/emma"
  epochs: 20
  batch_size: 4
  learning_rate: 0.0001
  warmup_steps: 100
  save_every_n_epochs: 5
